<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F0F1A;color:#E8E8F0;font-family:Arial,sans-serif;padding:12px;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.card{background:#1A1A2E;border:0.5px solid #2A2A42;border-radius:12px;padding:14px 16px}
.dark-card{background:#12122A;border:0.5px solid #2A2A42;border-radius:12px;padding:14px 16px}
.sec-title{font-size:11px;font-weight:700;color:#555570;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.level-lbl{font-size:10px;font-weight:700;color:#444466;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;padding-left:2px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:#12122A;border-radius:8px;padding:10px;text-align:center}
.stat-val{font-size:17px;font-weight:700;color:#E8E8F0}
.stat-lbl{font-size:10px;color:#555570;margin-top:2px}
.tab-row{display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;border:0.5px solid #2A2A42;color:#888899;background:#12122A;cursor:pointer;transition:all .15s}
.tab.active{background:#0F3D2E;color:#1D9E75;border-color:#1D9E75}
.pbar-wrap{background:#1E1E38;border-radius:4px;overflow:hidden}
.pbar-fill{border-radius:4px;transition:width .6s ease}
.pbar-labels{display:flex;justify-content:space-between;font-size:10px;color:#333355;margin-top:3px}
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#2A2A42;border-radius:8px;overflow:hidden;margin-top:10px}
.metric{background:#12122A;padding:10px;text-align:center}
.mv{font-size:15px;font-weight:700}
.ml{font-size:10px;color:#444466;margin-top:2px}
.gantt-header{display:flex;margin-left:120px;margin-bottom:5px}
.gantt-wk{flex:1;font-size:10px;color:#333355;text-align:center}
.gantt-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.gantt-row:last-child{margin-bottom:0}
.gantt-lbl{width:112px;flex-shrink:0;font-size:11px}
.gantt-track{flex:1;background:#12122A;border-radius:3px;height:20px;position:relative;overflow:hidden}
.gantt-bg{position:absolute;height:100%;border-radius:3px;opacity:.2}
.gantt-prog{position:absolute;height:100%;border-radius:3px;opacity:.9;transition:width .5s}
.gantt-text{position:absolute;height:100%;display:flex;align-items:center;padding-left:7px;font-size:10px;font-weight:700;gap:4px}
.pulse{width:5px;height:5px;border-radius:50%;flex-shrink:0;animation:p 1.5s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.phase-block{margin-bottom:10px}
.phase-block:last-child{margin-bottom:0}
.phase-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;user-select:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.phase-name{flex:1;font-size:12px;font-weight:700}
.phase-cnt{font-size:11px;color:#555570}
.chevron{font-size:14px;color:#555570;transition:transform .2s}
.chevron.open{transform:rotate(90deg)}
.task-list{display:none;flex-direction:column;gap:4px;padding:4px 0 0 4px}
.task-list.open{display:flex}
.task-row{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;background:#12122A;border-radius:7px}
.task-cb{width:15px;height:15px;border-radius:3px;border:0.5px solid #333355;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px}
.task-cb.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.task-cb.working{background:#E07B39;border-color:#E07B39;color:#fff}
.task-info{flex:1;min-width:0}
.task-name{font-size:11px;color:#C8C8D8;line-height:1.4}
.task-name.done{color:#444466;text-decoration:line-through}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.priority{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0}
.p-high{background:#3A1515;color:#E24B4A}
.p-mid{background:#2A2010;color:#EF9F27}
.p-low{background:#0F2A1E;color:#1D9E75}
.deadline{font-size:10px;color:#444466}
.deadline.overdue{color:#E24B4A;font-weight:700}
.type-tag{font-size:9px;color:#333355;padding:1px 5px;border:0.5px solid #2A2A42;border-radius:4px}
.coins{font-size:10px;font-weight:700;color:#7F77DD;flex-shrink:0;white-space:nowrap}
.add-btn{display:flex;align-items:center;justify-content:center;padding:6px 10px;background:transparent;border:0.5px dashed #1D9E75;border-radius:7px;color:#1D9E75;font-size:11px;margin-top:4px;width:100%;cursor:pointer}.add-btn:hover{background:#0F3D2E}
.status-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.status-active{background:#0F3D2E;color:#1D9E75;border:0.5px solid #1D9E75}
.status-launch{background:#2A2010;color:#EF9F27;border:0.5px solid #EF9F27}
.status-idea{background:#1E1E38;color:#888899;border:0.5px solid #333355}
.status-scale{background:#0C1E38;color:#2471A3;border:0.5px solid #2471A3}
.streak-row{display:flex;gap:8px;margin-bottom:12px}
.streak-stat{background:#12122A;border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px;flex:1}
.streak-icon{font-size:16px}
.streak-val{font-size:18px;font-weight:700;color:#E8E8F0}
.streak-lbl{font-size:10px;color:#555570;margin-top:1px}
.days-grid{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.day{width:20px;height:20px;border-radius:3px;position:relative;cursor:pointer;flex-shrink:0}
.day:hover .tip{display:block}
.tip{display:none;position:absolute;bottom:26px;left:50%;transform:translateX(-50%);background:#2A2A42;border:0.5px solid #3A3A55;border-radius:6px;padding:4px 8px;white-space:nowrap;font-size:10px;color:#C8C8D8;z-index:10;pointer-events:none}
.tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:3px solid transparent;border-top-color:#2A2A42}
.loading{text-align:center;padding:60px 20px;color:#555570;font-size:14px}
.loading-spinner{width:32px;height:32px;border:2px solid #2A2A42;border-top-color:#1D9E75;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{text-align:center;padding:20px;color:#E24B4A;font-size:13px;background:#3A1515;border-radius:8px}
.refresh-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.refresh-btn{font-size:11px;color:#555570;background:transparent;border:0.5px solid #2A2A42;border-radius:6px;padding:4px 10px;cursor:pointer}
.refresh-btn:hover{color:#C8C8D8;border-color:#555570}
.updated-lbl{font-size:10px;color:#333355}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    Загружаем данные...
  </div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbyiepOL0dmJsY7suoKvdU-CnOkyW7oQpsxvjIA0lLvQ6bCayl0tzcvGedtuh3LIIQiR/exec';
var CACHE_KEY = 'portfolio_data_v5';
var CACHE_TTL = 5 * 60 * 1000; // 5 минут

var state = {
  data: null,
  activeUnit: null,
  openPhases: {}
};

var COIN_MAP = {'Высокий':1000,'Средний':500,'Низкий':200};
var PHASE_COLORS = ['#7F77DD','#1D9E75','#BA7517','#378ADD','#D4537E'];

// ── ЗАГРУЗКА с кэшем ─────────────────────────────────────────────
function loadData(forceRefresh) {
  // Показать кэш мгновенно если есть
  if (!forceRefresh) {
    try {
      var cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        var obj = JSON.parse(cached);
        if (Date.now() - obj.ts < CACHE_TTL) {
          state.data = obj.data;
          state.activeUnit = obj.data.units[0].id;
          render();
          // Тихо обновить в фоне
          fetchData(true);
          return;
        }
      }
    } catch(e) {}
  }
  fetchData(false);
}

function fetchData(silent) {
  if (!silent) {
    document.getElementById('app').innerHTML =
      '<div class="loading"><div class="loading-spinner"></div>Загружаем данные...</div>';
  }

  // JSONP — обходит CORS
  var callbackName = 'cb_' + Date.now();
  var script = document.createElement('script');
  var timeout = setTimeout(function() {
    // Если JSONP не сработал — пробуем fetch
    script.remove();
    fetchViaFetch(silent);
  }, 8000);

  window[callbackName] = function(data) {
    clearTimeout(timeout);
    script.remove();
    delete window[callbackName];
    onDataLoaded(data, silent);
  };

  script.src = API + '?callback=' + callbackName;
  document.head.appendChild(script);
}

function fetchViaFetch(silent) {
  fetch(API)
    .then(function(r) { return r.json(); })
    .then(function(data) { onDataLoaded(data, silent); })
    .catch(function(err) {
      if (!silent) {
        document.getElementById('app').innerHTML =
          '<div class="loading"><div class="error-box">Ошибка загрузки.<br>Открой URL в браузере и проверь доступ.<br><br>'+err.message+'</div></div>';
      }
    });
}

function onDataLoaded(data, silent) {
  state.data = data;
  if (!state.activeUnit && data.units && data.units.length > 0) {
    state.activeUnit = data.units[0].id;
  }
  // Сохранить в кэш
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data }));
  } catch(e) {}
  render();
}

// ── HELPERS ───────────────────────────────────────────────────────
function getUnit(id) { return state.data.units.find(function(u){ return u.id===id; }); }
function getPhases(id) { return state.data.phases.filter(function(p){ return p.unitId===id; }).sort(function(a,b){ return a.order-b.order; }); }
function getTasks(id) { return state.data.tasks.filter(function(t){ return t.unitId===id; }); }
function getFinance(id) { return state.data.finance.filter(function(f){ return f.unitId===id; }); }
function coins(t) { return t.coins || COIN_MAP[t.priority] || 200; }

function isOverdue(dl, status) {
  if (!dl || dl==='01.01.1970' || status==='✅ Готово' || status==='❌ Отменено') return false;
  var p = dl.split('.');
  if (p.length < 3) return false;
  return new Date(p[2], p[1]-1, p[0]) < new Date();
}

function pad(n) { return n<10?'0'+n:''+n; }
function todayKey() {
  var d=new Date();
  return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
}

function statusBadge(s) {
  var cls = s==='Активен'?'status-active':s==='Запуск'?'status-launch':s==='Масштаб'?'status-scale':'status-idea';
  return '<span class="status-badge '+cls+'">'+s+'</span>';
}

function numFmt(n) { return Math.round(n||0).toLocaleString('ru-RU'); }

function getActivity(tasks) {
  var map={};
  tasks.forEach(function(t){ if(t.doneDate) map[t.doneDate]=(map[t.doneDate]||0)+1; });
  var days=[]; var today=new Date();
  for(var i=29;i>=0;i--){
    var d=new Date(today); d.setDate(today.getDate()-i);
    var k=pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
    days.push({key:k,count:map[k]||0});
  }
  var streak=0;
  for(var i=days.length-1;i>=0;i--){
    if(days[i].count>0) streak++; else break;
  }
  return {days:days,streak:streak,total:days.filter(function(d){return d.count>0;}).length};
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  var d=state.data; if(!d) return;
  var totalBudget=0;
  d.finance.forEach(function(f){ totalBudget+=(f.contribution||0); });
  var activeUnits=d.units.filter(function(u){return u.status==='Активен';}).length;
  var html='';

  // Refresh row
  html+='<div class="refresh-row">';
  html+='<span class="updated-lbl">Обновлено: '+(d.updated||'—')+'</span>';
  html+='<button class="refresh-btn" onclick="loadData(true)">Обновить</button>';
  html+='</div>';

  // ══ УРОВЕНЬ 1 ══
  html+='<div class="level-lbl">Уровень 1 — главная цель</div>';
  html+='<div class="card">';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">';
  html+='<div><div style="font-size:11px;color:#555570;margin-bottom:4px">Главная цель</div>';
  html+='<div style="font-size:14px;font-weight:700;color:#C8C8D8;line-height:1.5">300 000 ₽ в месяц<br>→ в семейный бюджет</div></div>';
  html+='<div style="text-align:right"><div style="font-size:10px;color:#555570;margin-bottom:2px">Накоплено в облигациях</div>';
  html+='<div style="font-size:24px;font-weight:700;color:#1D9E75">'+numFmt(totalBudget)+' ₽</div>';
  html+='<div style="font-size:10px;color:#333355;margin-top:1px">из 18 000 000 ₽ за 5 лет</div></div></div>';
  html+='<div class="grid4">';
  html+='<div class="stat"><div class="stat-val">'+numFmt(totalBudget)+' ₽</div><div class="stat-lbl">Этот месяц</div></div>';
  html+='<div class="stat"><div class="stat-val">'+activeUnits+'</div><div class="stat-lbl">Активных юнита</div></div>';
  html+='<div class="stat"><div class="stat-val">'+numFmt(totalBudget)+' ₽</div><div class="stat-lbl">В облигациях</div></div>';
  html+='<div class="stat"><div class="stat-val" style="color:#1D9E75">5 лет</div><div class="stat-lbl">Горизонт</div></div>';
  html+='</div>';
  var mGoal=300000,mPct=Math.min(100,Math.round(totalBudget/mGoal*100));
  var bClr=mPct>=100?'#1D9E75':mPct>=60?'#EF9F27':'#E24B4A';
  html+='<div style="margin-top:12px"><div style="display:flex;justify-content:space-between;margin-bottom:5px">';
  html+='<span style="font-size:11px;color:#555570">Прогресс к цели месяца</span>';
  html+='<span style="font-size:11px;font-weight:700;color:'+bClr+'">'+Math.round(totalBudget).toLocaleString("ru-RU")+' / 300 000 ₽</span>';
  html+='</div><div style="background:#1E1E38;border-radius:4px;height:8px;overflow:hidden">';
  html+='<div style="width:'+mPct+'%;height:8px;background:'+bClr+'"></div></div>';
  html+='<div style="display:flex;justify-content:space-between;font-size:10px;color:#333355;margin-top:3px">';
  html+='<span>0</span><span>'+mPct+'%</span><span>300 000 ₽</span></div></div>';
  html+='</div>';

  // ══ УРОВЕНЬ 2 — ТАБЫ ══
  html+='<div class="level-lbl">Уровень 2 — юниты</div>';
  html+='<div class="card" style="padding:10px 16px"><div class="tab-row">';
  d.units.forEach(function(u){
    var a=u.id===state.activeUnit?' active':'';
    html+='<div class="tab'+a+'" onclick="switchUnit(\''+u.id+'\')">'+u.name+'</div>';
  });
  html+='</div></div>';

  // ══ УРОВЕНЬ 3 ══
  html+=renderUnit(state.activeUnit);

  document.getElementById('app').innerHTML=html;
  renderActivity(state.activeUnit);
}

function renderUnit(uid) {
  var u=getUnit(uid); if(!u) return '';
  var phases=getPhases(uid); var tasks=getTasks(uid); var finance=getFinance(uid);
  var html='<div class="level-lbl">Уровень 3 — '+u.name+'</div>';

  // ── БЛОК 1: ГЕЙМИФИКАЦИЯ ──
  var totalC=tasks.reduce(function(s,t){return s+coins(t);},0);
  var earnedC=tasks.filter(function(t){return t.status==='✅ Готово';}).reduce(function(s,t){return s+coins(t);},0);
  var done=tasks.filter(function(t){return t.status==='✅ Готово';}).length;
  var total=tasks.length;
  var today=todayKey();
  var todayC=tasks.filter(function(t){return t.doneDate===today;}).reduce(function(s,t){return s+coins(t);},0);
  var coinPct=totalC>0?Math.round(earnedC/totalC*100):0;
  var taskPct=total>0?Math.round(done/total*100):0;

  html+='<div class="dark-card">';
  html+='<div style="display:flex;justify-content:space-between;margin-bottom:10px">';
  html+='<div style="font-size:12px;color:#444466">Бюджет — '+u.name+'</div>';
  html+='<div style="font-size:11px;color:#333355">'+u.startDate+'</div></div>';
  html+='<div style="font-size:36px;font-weight:700;color:'+u.color+';letter-spacing:-1px;margin-bottom:10px">'+numFmt(earnedC)+' <span style="font-size:22px;color:#555570">₽</span></div>';
  html+='<div style="margin-bottom:8px"><div style="font-size:10px;color:#444466;margin-bottom:4px">Прогресс по монетам</div>';
  html+='<div class="pbar-wrap" style="height:6px"><div class="pbar-fill" style="width:'+coinPct+'%;background:'+u.color+';height:6px"></div></div>';
  html+='<div class="pbar-labels"><span>'+numFmt(earnedC)+' ₽ заработано</span><span>Максимум: '+numFmt(totalC)+' ₽</span></div></div>';
  html+='<div><div style="font-size:10px;color:#444466;margin-bottom:4px">Прогресс по задачам</div>';
  html+='<div class="pbar-wrap" style="height:6px"><div class="pbar-fill" style="width:'+taskPct+'%;background:#1D9E75;height:6px"></div></div>';
  html+='<div class="pbar-labels"><span>'+done+' из '+total+' задач выполнено</span><span>'+taskPct+'%</span></div></div>';
  html+='<div class="metric-row">';
  html+='<div class="metric"><div class="mv" style="color:'+u.color+'">'+numFmt(earnedC)+' ₽</div><div class="ml">Заработано всего</div></div>';
  html+='<div class="metric"><div class="mv" style="color:#5DCAA5">+'+numFmt(todayC)+' ₽</div><div class="ml">Сегодня</div></div>';
  html+='<div class="metric"><div class="mv" style="color:#888899">'+numFmt(totalC)+' ₽</div><div class="ml">Можно заработать</div></div>';
  html+='</div></div>';

  // ── БЛОК 2: СТАТИСТИКА ──
  var fin=finance.length>0?finance[finance.length-1]:null;
  var profit=fin?(fin.profit||0):0;
  var contrib=fin?(fin.contribution||0):0;
  var overdue=tasks.filter(function(t){return isOverdue(t.deadline,t.status);}).length;
  var overPct=total>0?Math.round(overdue/total*100):0;

  html+='<div class="card"><div class="sec-title">Статистика юнита</div>';
  html+='<div class="grid4">';
  html+='<div class="stat"><div class="stat-val" style="color:#1D9E75">'+numFmt(profit)+' ₽</div><div class="stat-lbl">Чистая прибыль</div></div>';
  html+='<div class="stat"><div class="stat-val" style="color:#5DCAA5">'+numFmt(contrib)+' ₽</div><div class="stat-lbl">10% в бюджет</div></div>';
  html+='<div class="stat"><div class="stat-val">'+total+'</div><div class="stat-lbl">Всего задач</div></div>';
  html+='<div class="stat"><div style="margin-bottom:5px">'+statusBadge(u.status)+'</div><div class="stat-lbl">Статус</div></div>';
  html+='</div>';
  html+='<div style="margin-top:12px"><div style="display:flex;justify-content:space-between;margin-bottom:5px">';
  html+='<span style="font-size:11px;color:#555570">Просрочка по задачам</span>';
  html+='<span style="font-size:11px;color:#E24B4A;font-weight:700">'+overdue+' из '+total+' просрочено</span></div>';
  html+='<div class="pbar-wrap" style="height:8px;background:#1E1E38"><div class="pbar-fill" style="width:'+overPct+'%;background:#E24B4A;height:8px"></div></div>';
  html+='<div class="pbar-labels"><span>0%</span><span>'+overPct+'% просрочено</span></div></div></div>';

  // ── БЛОК 3: ГАНТ ──
  html+='<div class="card"><div class="sec-title">Гант по фазам</div>';
  html+='<div class="gantt-header">';
  ['Нед.1','Нед.2','Нед.3','Нед.4','Мес.2','Мес.3','Мес.4','Мес.5','Мес.6'].forEach(function(p){
    html+='<div class="gantt-wk">'+p+'</div>';
  });
  html+='</div>';
  var n=phases.length||1;
  phases.forEach(function(ph,idx){
    var pt=tasks.filter(function(t){return t.phaseId==ph.number;});
    var pd=pt.filter(function(t){return t.status==='✅ Готово';}).length;
    var pn=pt.length;
    var pct=pn>0?Math.round(pd/pn*100):0;
    var active=pd>0&&pd<pn;
    var segW=Math.round(100/n);
    var left=idx*segW;
    var color=PHASE_COLORS[idx%PHASE_COLORS.length];
    html+='<div class="gantt-row">';
    html+='<div class="gantt-lbl" style="color:'+(active?color:'#444466')+'">'+ph.name+'</div>';
    html+='<div class="gantt-track">';
    html+='<div class="gantt-bg" style="left:'+left+'%;width:'+segW+'%;background:'+color+'"></div>';
    if(pct>0) html+='<div class="gantt-prog" style="left:'+left+'%;width:'+(segW*pct/100)+'%;background:'+color+'"></div>';
    html+='<div class="gantt-text" style="left:'+left+'%;width:'+segW+'%;color:'+(pct>0?'#EEEDFE':'#444466')+'">';
    if(active) html+='<div class="pulse" style="background:'+color+'"></div>';
    html+=pd+'/'+pn+'</div></div></div>';
  });
  html+='</div>';

  // ── БЛОК 4: ЗАДАЧИ ──
  html+='<div class="card"><div class="sec-title">Задачи по фазам</div>';
  phases.forEach(function(ph,idx){
    var pt=tasks.filter(function(t){return t.phaseId==ph.number;});
    var pd=pt.filter(function(t){return t.status==='✅ Готово';}).length;
    var color=PHASE_COLORS[idx%PHASE_COLORS.length];
    var key=uid+'_'+ph.number;
    var open=state.openPhases[key];
    html+='<div class="phase-block">';
    html+='<div class="phase-hdr" style="background:rgba(255,255,255,0.03)" onclick="togglePhase(\''+key+'\')">';
    html+='<div class="dot" style="background:'+color+'"></div>';
    html+='<div class="phase-name" style="color:'+(pd>0?color:'#666677')+'">'+ph.name+'</div>';
    if(ph.period) html+='<div style="font-size:10px;color:#333355">'+ph.period+'</div>';
    html+='<div class="phase-cnt">'+pd+'/'+pt.length+'</div>';
    html+='<div class="chevron'+(open?' open':'')+'">\u203a</div></div>';
    html+='<div class="task-list'+(open?' open':'')+'">';
    pt.forEach(function(t){
      var done=t.status==='✅ Готово';
      var working=t.status==='⚡ В работе';
      var over=isOverdue(t.deadline,t.status);
      var cbCls=done?'done':working?'working':'';
      var cbIcon=done?'✓':working?'⚡':'';
      var pCls=t.priority==='Высокий'?'p-high':t.priority==='Средний'?'p-mid':'p-low';
      html+='<div class="task-row">';
      html+='<div class="task-cb '+cbCls+'">'+cbIcon+'</div>';
      html+='<div class="task-info">';
      html+='<div class="task-name'+(done?' done':'')+'">'+t.name+'</div>';
      html+='<div class="task-meta">';
      html+='<span class="priority '+pCls+'">'+t.priority+'</span>';
      if(t.deadline && t.deadline!=='01.01.1970' && t.deadline.length>4){
        html+=over?'<span style="font-size:11px;font-weight:700;color:#fff;background:#C0392B;padding:2px 8px;border-radius:5px">'+t.deadline+' !</span>':'<span style="font-size:11px;font-weight:700;color:#C8C8D8;background:#252540;padding:2px 8px;border-radius:5px">'+t.deadline+'</span>';
      }
      if(t.type) html+='<span class="type-tag">'+t.type+'</span>';
      html+='</div></div>';
      html+='<div class="coins">+'+numFmt(coins(t))+' ₽</div>';
      html+='</div>';
    });
    html+='<div class="add-btn" onclick="openAddTask(\''+uid+'\','+ph.number+')">+ Добавить задачу</div>';
    html+='</div></div>';
  });
  html+='</div>';

  // ── БЛОК 5: АКТИВНОСТЬ ──
  html+='<div class="card"><div class="sec-title">Активность</div>';
  html+='<div id="streak_'+uid+'"></div>';
  html+='<div class="days-grid" id="act_'+uid+'"></div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:center">';
  html+='<div style="font-size:11px;color:#555570">Последние 30 дней</div>';
  html+='<div style="display:flex;align-items:center;gap:6px">';
  html+='<div style="width:12px;height:12px;border-radius:2px;background:#1E1E38"></div><div style="font-size:10px;color:#555570">нет</div>';
  html+='<div style="width:12px;height:12px;border-radius:2px;background:#5DCAA5;margin-left:6px"></div><div style="font-size:10px;color:#555570">активно</div>';
  html+='</div></div></div>';

  return html;
}

function renderActivity(uid) {
  var tasks=getTasks(uid);
  var act=getActivity(tasks);
  var today=todayKey();
  var todayC=tasks.filter(function(t){return t.doneDate===today;}).reduce(function(s,t){return s+coins(t);},0);

  var se=document.getElementById('streak_'+uid);
  if(se) se.innerHTML=
    '<div class="streak-row">'+
    '<div class="streak-stat"><div class="streak-icon">\uD83D\uDD25</div><div><div class="streak-val">'+act.streak+'</div><div class="streak-lbl">дней подряд</div></div></div>'+
    '<div class="streak-stat"><div class="streak-icon">\uD83D\uDCC5</div><div><div class="streak-val">'+act.total+'</div><div class="streak-lbl">активных дней</div></div></div>'+
    '<div class="streak-stat"><div class="streak-icon">₽</div><div><div class="streak-val" style="color:#7F77DD">+'+numFmt(todayC)+' ₽</div><div class="streak-lbl">сегодня</div></div></div>'+
    '</div>';

  var ge=document.getElementById('act_'+uid);
  if(!ge) return;
  ge.innerHTML='';
  act.days.forEach(function(d){
    var el=document.createElement('div');
    el.className='day';
    el.style.background=d.count>=5?'#1D9E75':d.count>=3?'#5DCAA5':d.count>=1?'#9FE1CB':'#1E1E38';
    if(d.count>0){
      var tip=document.createElement('div');
      tip.className='tip';
      var w=d.count===1?'задача':d.count<5?'задачи':'задач';
      tip.textContent='Сделано '+d.count+' '+w;
      el.appendChild(tip);
    }
    ge.appendChild(el);
  });
}

function switchUnit(uid) {
  state.activeUnit=uid;
  render();
  renderActivity(uid);
}

function togglePhase(key) {
  state.openPhases[key]=!state.openPhases[key];
  var list=document.getElementById('phase_'+key);
  // Re-render only phases block would be complex, just full render
  render();
  renderActivity(state.activeUnit);
}

// Также поддержать JSONP ответ от Apps Script
function handleJsonp(data) { onDataLoaded(data, false); }

loadData(false);
</script>

<style>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Новая задача</div>

    <div class="modal-row"><div class="modal-lbl">Приоритет</div><select class="modal-select" id="t_priority"><option>Высокий</option><option>Средний</option><option>Низкий</option></select></div>
    <div class="modal-row"><div class="modal-lbl">Дедлайн</div><input class="modal-input" id="t_deadline" type="date"></div>
    <div class="modal-row"><div class="modal-lbl">Тип задачи</div><select class="modal-select" id="t_type"><option>Одноразовая</option><option>Повторяющаяся</option><option>Операционная</option><option>Проектная</option></select></div>
    <div class="modal-row"><div class="modal-lbl">Ответственный</div><input class="modal-input" id="t_assignee" placeholder="Имя..."></div>

    <div class="reward-icon">&#x1F389;</div>

    <div class="reward-badge" id="rBadge"></div>

<script>
var WR_API='https://script.google.com/macros/s/AKfycbyiepOL0dmJsY7suoKvdU-CnOkyW7oQpsxvjIA0lLvQ6bCayl0tzcvGedtuh3LIIQiR/exec';
var CM2={'Высокий':1000,'Средний':500,'Низкий':200};
var modalUnit=null,modalPhase=null;

function jsonpPost(url,params,ok,err){
  var cb='jcb_'+Date.now()+'_'+Math.floor(Math.random()*9999);
  var s=document.createElement('script');
  var t=setTimeout(function(){s.remove();delete window[cb];if(err)err();},15000);
  window[cb]=function(d){clearTimeout(t);s.remove();delete window[cb];if(ok)ok(d);};
  params.callback=cb;
  var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  s.src=url+'?'+qs;
  document.head.appendChild(s);
}

function openAddTask(uid,phaseId){
  modalUnit=uid;modalPhase=phaseId;
  ['t_name','t_deadline','t_assignee','t_note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('modal_status').textContent='';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function saveTask(){
  var name=document.getElementById('t_name').value.trim();
  if(!name){document.getElementById('modal_status').textContent='Введи название';return;}
  var dl=document.getElementById('t_deadline').value,dlFmt='';
  if(dl){var p=dl.split('-');dlFmt=p[2]+'.'+p[1]+'.'+p[0];}
  var pri=document.getElementById('t_priority').value;
  document.getElementById('modal_status').textContent='Сохраняем...';
  jsonpPost(WR_API,{
    action:'addTask',unitId:modalUnit,phaseId:modalPhase,name:name,
    type:document.getElementById('t_type').value,
    assignee:document.getElementById('t_assignee').value,
    priority:pri,deadline:dlFmt,coins:CM2[pri]||500,
    status:document.getElementById('t_status').value,
    note:document.getElementById('t_note').value
  },function(res){
    if(res&&res.success){
      document.getElementById('modal_status').textContent='✅ Добавлено!';
      setTimeout(function(){closeModal();loadData(true);},1000);
    }else{
      document.getElementById('modal_status').textContent='Ошибка: '+((res&&res.error)||'?');
    }
  },function(){document.getElementById('modal_status').textContent='Ошибка сети';});
}

function closeReward(){document.getElementById('rewardModal').classList.remove('open');}

function showReward(taskName,coinsVal,unitId){
  var tasks=state.data?state.data.tasks.filter(function(t){return t.unitId===unitId;}):[]; 
  var earned=tasks.filter(function(t){return t.status==='✅ Готово';}).reduce(function(s,t){return s+(parseInt(t.coins)||CM2[t.priority]||200);},0);
  var done=tasks.filter(function(t){return t.status==='✅ Готово';}).length;
  document.getElementById('rTaskName').textContent=taskName;
  document.getElementById('rCoins').textContent='+'+coinsVal.toLocaleString('ru-RU')+' ₽';
  document.getElementById('rTotal').textContent=earned.toLocaleString('ru-RU')+' ₽';
  document.getElementById('rBadge').textContent='✅ '+done+' задач выполнено';
  document.getElementById('rewardModal').classList.add('open');
}
</script>
